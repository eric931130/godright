runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512
env:
  # 站台設定（NEXT_PUBLIC_* 需在 build 時 inline）
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://godright-75b61.web.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DATA_SOURCE
    value: mock
    availability:
      - BUILD
      - RUNTIME
  - variable: PAYMENT_PROVIDER
    value: mock
    availability:
      - RUNTIME

  # Firebase 公開 Web 設定（可進瀏覽器 bundle，非機密）
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyCwGRt9lgQuPezIVUVeO4-9XMQaHfqdLe0
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: godright-75b61.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: godright-75b61
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: godright-75b61.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "32254801020"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:32254801020:web:97508d4a7fcea5d568c5f9"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-HRFT4TMLWG
    availability:
      - BUILD
      - RUNTIME

  # 開發者後台機密（值存於 Secret Manager / App Hosting secrets，不在此檔；RUNTIME only）
  - variable: ADMIN_FIREBASE_UID
    secret: ADMIN_FIREBASE_UID
  - variable: ADMIN_EMAIL
    secret: ADMIN_EMAIL
  - variable: ADMIN_SECONDARY_PIN_SALT
    secret: ADMIN_SECONDARY_PIN_SALT
  - variable: ADMIN_SECONDARY_PIN_HASH
    secret: ADMIN_SECONDARY_PIN_HASH
  - variable: ADMIN_SESSION_SECRET
    secret: ADMIN_SESSION_SECRET
  - variable: ADMIN_REQUIRE_CUSTOM_CLAIM
    value: "false"
    availability:
      - RUNTIME

# 伺服端 Firebase Admin 在 App Hosting 以執行身分（ADC）運作，無需 FIREBASE_PRIVATE_KEY。
